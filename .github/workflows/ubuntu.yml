name: Ubuntu CI

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Linux
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, hetzner-public]
    container:
      image: ubuntu:26.04
    timeout-minutes: 360
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G
      CTEST_TIMEOUT_SECONDS: 2700

    steps:
    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          ccache \
          cmake \
          git \
          libboost-all-dev \
          perl \
          zstd

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Restore compiler cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ github.run_id }}
        restore-keys: ccache-${{ runner.os }}-ubuntu-26-${{ github.head_ref || github.ref_name }}-

    - name: Configure compiler cache
      run: ccache --max-size="$CCACHE_MAXSIZE"

    - name: Configure
      run: |
        cmake -S . -B build \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_FLAGS="-Werror -fsanitize=address,undefined -fno-omit-frame-pointer" \
          -DBUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE=Release

    - name: List tests
      run: ctest --test-dir build -N | tee build/ctest-tests.txt

    - name: Compile tests
      run: |
        jobs="$(nproc)"
        echo "Compiling tests with $jobs parallel jobs"
        cmake --build build --target tests --parallel "$jobs"

    - name: Run tests
      run: |
        jobs="$(nproc)"
        echo "Running tests with $jobs parallel jobs"
        ctest --test-dir build --output-on-failure --parallel "$jobs" --timeout "$CTEST_TIMEOUT_SECONDS" --output-junit build/ctest-results.xml

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-ci-test-results
        path: |
          build/ctest-tests.txt
          build/ctest-results.xml
          build/Testing/
        if-no-files-found: ignore
