name: ubuntu ci

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, hetzner-public]
    container:
      image: ubuntu:26.04
    timeout-minutes: 360
    env:
      CCACHE_COMPRESS: "true"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G

    steps:
    - name: install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          ccache \
          cmake \
          expect \
          git \
          libboost-all-dev \
          perl \
          zstd
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: restore compiler cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-${{ runner.os }}-${{ github.head_ref || github.ref_name }}-${{ github.run_id }}
        restore-keys:  ccache-${{ runner.os }}-${{ github.head_ref || github.ref_name }}
    - name: configure compiler cache
      run: |
        ccache --max-size="$CCACHE_MAXSIZE"
        ccache --zero-stats
    - name: configure
      run: |
        cmake -S . -B build \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_FLAGS="-Werror -fsanitize=address,undefined -fno-omit-frame-pointer" \
          -DBUILD_TESTS=ON \
          -DCMAKE_BUILD_TYPE=Release
    - name: run test harness
      working-directory: build
      run: |
        jobs="$(nproc)"
        echo "Running test harness with $jobs parallel jobs"
        ../scripts/test_all.sh -j"$jobs" -l -t45m
    - name: show compiler cache stats
      if: always()
      run: ccache --show-stats
    - name: upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-ci-test-logs
        path: |
          build/linux.csv
          build/linux.csv.logs/
        if-no-files-found: ignore
