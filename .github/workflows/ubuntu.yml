name: ubuntu ci

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: install boost
      run: sudo apt-get update && sudo apt-get install -y libboost-all-dev expect fdfind
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: configure
      run: mkdir -p build && cd build && cmake -DCMAKE_CXX_FLAGS="-Werror -fsanitize=address,undefined -fno-omit-frame-pointer"  -DCMAKE_BUILD_TYPE=Release ..
    - name: run test harness
      run: cd build && ../scripts/test_all.sh -j8