name: ubuntu ci

on:
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64, hetzner-public]
    container:
      image: ubuntu:26.04
    timeout-minutes: 360

    steps:
    - name: install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential \
          ca-certificates \
          cmake \
          expect \
          git \
          libboost-all-dev \
          perl
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: configure
      run: cmake -S . -B build -DCMAKE_CXX_FLAGS="-Werror -fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_BUILD_TYPE=Release
    - name: run test harness
      working-directory: build
      run: |
        jobs="$(nproc)"
        echo "Running test harness with $jobs parallel jobs"
        ../scripts/test_all.sh -j"$jobs" -l -t45m
    - name: upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-ci-test-logs
        path: |
          build/linux.csv
          build/linux.csv.logs/
        if-no-files-found: ignore
